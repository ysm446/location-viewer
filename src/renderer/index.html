<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Location Viewer</title>
  </head>
  <body>
    <div id="app">
      <!-- 中央: 大きいビュー領域（位置選択 / 2D / 3D をタブ切替） -->
      <div id="main-pane">
        <div id="left-tabs" class="tabs">
          <button id="tab-map" class="tab active" data-i18n="tab.map">位置選択</button>
          <button id="tab-2d" class="tab" data-i18n="tab.2d">2D ハイトマップ</button>
          <button id="tab-3d" class="tab" data-i18n="tab.3d">3D ビュー</button>
        </div>

        <div id="view-area">
          <!-- 位置選択（地図） -->
          <div id="view-map" class="view">
            <div id="map"></div>
            <!-- 生成パネル（位置選択タブのときだけ地図上にオーバーレイ表示） -->
            <div id="left-pane">
              <section class="card">
                <label data-i18n="side.source">標高ソース</label>
                <select id="source">
                  <option value="terrain-dem" data-i18n="source.dem">Mapbox Terrain-DEM v1 (推奨)</option>
                  <option value="terrain-rgb" data-i18n="source.rgb">Mapbox Terrain-RGB v1 (旧)</option>
                </select>

                <label
                  ><span data-i18n="side.zoom">ズームレベル (解像度):</span>
                  <span id="zoom-val">12</span></label
                >
                <input id="zoom" type="range" min="6" max="15" value="12" />

                <div class="grid2">
                  <div><label>West</label><input id="west" type="number" step="0.0001" /></div>
                  <div><label>East</label><input id="east" type="number" step="0.0001" /></div>
                  <div><label>South</label><input id="south" type="number" step="0.0001" /></div>
                  <div><label>North</label><input id="north" type="number" step="0.0001" /></div>
                </div>

                <label id="snap-pow2-label" class="checkbox-row" data-i18n-title="map.snap.title">
                  <input id="snap-pow2" type="checkbox" />
                  <span data-i18n="map.snap">2のべき乗</span>
                </label>

                <p class="muted" id="estimate" data-i18n="estimate.initial">推定: -</p>
                <button id="btn-generate" class="primary" data-i18n="btn.generate">
                  新規ロケーション作成
                </button>
                <button id="btn-update-terrain" disabled data-i18n="terrain.update">
                  選択中の地形を更新
                </button>
                <div id="progress" class="muted"></div>
              </section>
            </div>
            <div id="map-overlay">
              <select id="map-style" data-i18n-title="map.style.title">
                <option value="satellite" data-i18n="style.satellite">衛星写真</option>
                <option value="satellite-streets" data-i18n="style.satellite-streets">
                  衛星＋地名
                </option>
                <option value="streets" data-i18n="style.streets">地図（地名）</option>
                <option value="outdoors" data-i18n="style.outdoors">地形図</option>
              </select>
              <button id="btn-map-3d" data-i18n-title="map.3d.title">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M2 20 L8.5 8 L12 14 L15 9 L22 20 Z"/></svg>
                3D
              </button>
              <button id="btn-tile-grid" data-i18n-title="map.tileGrid.title">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16v16H4z"/><path d="M12 4v16"/><path d="M4 12h16"/></svg>
                <span data-i18n="map.tileGrid">グリッド</span>
              </button>
              <button id="btn-draw" data-i18n="map.draw" data-i18n-title="map.draw.title">
                🖊 矩形を描く
              </button>
              <span id="bbox-readout" class="muted" data-i18n="bbox.none">範囲未選択</span>
            </div>
          </div>

          <!-- 2D グレースケール -->
          <div id="view-2d" class="view hidden">
            <div id="preview-2d-wrap">
              <img id="preview" alt="プレビュー" />
              <p class="muted" id="preview-empty" data-i18n="preview.empty">
                まだ生成・選択されていません
              </p>
            </div>
          </div>

          <!-- 3D 地形ビューワ -->
          <div id="view-3d" class="view hidden">
            <div id="viewer3d"></div>
            <div id="viewer3d-title"></div>
            <div id="viewer3d-info" class="muted"></div>
            <div id="viewer3d-controls">
              <label style="margin: 0" data-i18n="view3d.render">描画</label>
              <select id="render-mode" style="width: auto">
                <option value="default" data-i18n="render.default">デフォルト</option>
                <option value="heightmap" data-i18n="render.heightmap">ハイトマップ</option>
                <option value="satellite" data-i18n="render.satellite">衛星画像</option>
              </select>
              <div id="view-menu-wrap">
                <button id="btn-view-menu" type="button">
                  <span data-i18n="view3d.display">表示</span> ▾
                </button>
                <div id="view-menu" class="popup-menu hidden">
                  <label class="checkbox-row">
                    <input id="chk-show-grid" type="checkbox" checked />
                    <span data-i18n="grid.show">グリッドを表示</span>
                  </label>
                  <label class="checkbox-row">
                    <input id="chk-show-terrain" type="checkbox" checked />
                    <span data-i18n="terrain.show">地形を表示</span>
                  </label>
                  <label class="checkbox-row">
                    <input id="chk-show-contours" type="checkbox" />
                    <span data-i18n="contour.show">等高線を表示</span>
                  </label>
                  <label class="checkbox-row">
                    <input id="chk-show-landmarks" type="checkbox" checked />
                    <span data-i18n="landmark.show">地点を表示</span>
                  </label>
                  <div id="view-menu-landmark-options" class="popup-submenu">
                    <label class="checkbox-row">
                      <input id="chk-show-landmark-elevation" type="checkbox" checked />
                      <span data-i18n="landmark.elevation.show">標高</span>
                    </label>
                  </div>
                  <label class="checkbox-row">
                    <input id="chk-show-routes" type="checkbox" checked />
                    <span data-i18n="route.show">ルートを表示</span>
                  </label>
                  <div id="view-menu-route-cats" class="popup-submenu">
                    <label class="checkbox-row">
                      <input id="chk-show-route-road" type="checkbox" checked />
                      <span data-i18n="route.catRoad">道路</span>
                    </label>
                    <label class="checkbox-row">
                      <input id="chk-show-route-foot" type="checkbox" checked />
                      <span data-i18n="route.catFoot">歩道</span>
                    </label>
                    <label class="checkbox-row">
                      <input id="chk-show-route-trail" type="checkbox" checked />
                      <span data-i18n="route.catTrail">登山道</span>
                    </label>
                    <label class="checkbox-row">
                      <input id="chk-show-route-rail" type="checkbox" checked />
                      <span data-i18n="route.catRail">鉄道</span>
                    </label>
                    <label class="checkbox-row">
                      <input id="chk-show-route-aerialway" type="checkbox" checked />
                      <span data-i18n="route.catAerialway">ロープウェイ</span>
                    </label>
                    <label class="checkbox-row">
                      <input id="chk-show-route-info" type="checkbox" />
                      <span data-i18n="route.info">距離・勾配</span>
                    </label>
                  </div>
                  <label class="checkbox-row">
                    <input id="chk-show-help" type="checkbox" checked />
                    <span data-i18n="view3d.help">ヘルプ</span>
                  </label>
                  <label class="checkbox-row">
                    <input id="chk-show-debug" type="checkbox" />
                    <span data-i18n="view3d.debug">デバッグ</span>
                  </label>
                </div>
              </div>
            </div>
            <div id="viewer3d-help" data-i18n="view3d.hint">
              ドラッグ=回転 / ホイール=ズーム / 中・右ドラッグ=パン / O=自動回転
            </div>
          </div>
        </div>
      </div>

      <!-- 右ペインの幅をドラッグで変えるリサイザー -->
      <div id="right-resizer" title="ドラッグで幅を変更"></div>

      <!-- 右: ライブラリ / 環境設定 タブ -->
      <div id="right-pane">
        <div id="right-tabs" class="tabs">
          <button id="rtab-library" class="tab active" data-i18n="rtab.library">ライブラリ</button>
          <button id="rtab-settings" class="tab" data-i18n="rtab.settings">環境設定</button>
        </div>

        <!-- ワークスペース（クリックでドリルイン：選択以外を隠し、中身を下に並べる） -->
        <div id="rview-library" class="rview">
          <section id="ws-panel">
            <!-- 一覧モードのヘッダ -->
            <div class="row" id="ws-list-header" style="justify-content: space-between">
              <label id="lib-count" style="margin: 0">ロケーション</label>
              <div class="row" style="gap: 6px; align-items: center">
                <button id="btn-import-zip" title="ZIPからロケーションを復元">
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M12 3v10"/>
                    <path d="m8 9 4 4 4-4"/>
                    <path d="M4 15v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3"/>
                  </svg>
                  <span data-i18n="btn.importZip">インポート</span>
                </button>
              </div>
            </div>
            <!-- 詳細モードの戻るリンク -->
            <a id="ws-back" class="back-link" data-i18n="ws.back">← ロケーション一覧</a>

            <ul id="library-list"></ul>

            <!-- 選択ワークスペースの中身（詳細モードでのみ表示） -->
            <div id="ws-detail">
              <p class="muted" id="selected-info" data-i18n="selected.none">選択なし</p>

              <!-- ランドマーク / ルート のサブタブ -->
              <div id="ws-subtabs" class="tabs" style="margin-top: 12px">
                <button id="subtab-landmarks" class="tab active" data-i18n="landmark.title">
                  ランドマーク
                </button>
                <button id="subtab-routes" class="tab" data-i18n="route.title">ルート（OSM）</button>
                <button id="subtab-export" class="tab" data-i18n="export.title">エクスポート</button>
              </div>

              <!-- ランドマーク パネル -->
              <div id="subview-landmarks" class="subview">
                <div class="row landmark-actions">
                  <button id="btn-import-landmark-library" disabled data-i18n="landmark.importLibrary">
                    ライブラリから取り込み
                  </button>
                  <button id="btn-add-landmark" data-i18n="landmark.add">📍 地点を追加</button>
                  <button id="btn-remove-outside-landmarks" disabled data-i18n="landmark.removeOutside">
                    範囲外を削除
                  </button>
                </div>
                <p class="muted" id="landmark-library-status"></p>
                <p class="muted" id="landmark-hint" data-i18n="landmark.hint" hidden>
                  3Dビューで地形をクリックして地点を追加
                </p>
                <ul id="landmark-list"></ul>
              </div>

              <!-- ルート（OSM）パネル -->
              <div id="subview-routes" class="subview hidden">
                <div id="route-cats" style="display: flex; gap: 14px; flex-wrap: wrap; margin: 10px 0 6px">
                  <label class="checkbox-row"><input id="chk-route-road" type="checkbox" checked /><span data-i18n="route.catRoad">道路</span></label>
                  <label class="checkbox-row"><input id="chk-route-foot" type="checkbox" checked /><span data-i18n="route.catFoot">歩道</span></label>
                  <label class="checkbox-row"><input id="chk-route-trail" type="checkbox" checked /><span data-i18n="route.catTrail">登山道</span></label>
                  <label class="checkbox-row"><input id="chk-route-rail" type="checkbox" /><span data-i18n="route.catRail">鉄道</span></label>
                  <label class="checkbox-row"><input id="chk-route-aerialway" type="checkbox" /><span data-i18n="route.catAerialway">ロープウェイ</span></label>
                </div>
                <label class="checkbox-row" style="margin: 2px 0 8px">
                  <input id="chk-route-clip" type="checkbox" checked />
                  <span data-i18n="route.clip">エリア外をカット</span>
                </label>
                <div class="row route-actions">
                  <button id="btn-fetch-osm" data-i18n="route.fetch">🛣 OSMから取得</button>
                  <button id="btn-save-routes" hidden data-i18n="route.save">採用を保存</button>
                  <button id="btn-reclassify-routes" hidden data-i18n="route.reclassify">
                    🔄 種別を再判定
                  </button>
                  <button id="btn-clear-routes" class="link-danger" hidden data-i18n="route.clearAll">
                    全ルートをクリア
                  </button>
                </div>
                <p class="muted" id="route-status"></p>
                <ul id="route-list"></ul>
              </div>

              <!-- エクスポート パネル -->
              <div id="subview-export" class="subview hidden">
                <div class="export-group">
                  <h3 data-i18n="export.texture">テクスチャーのエクスポート</h3>
                  <label for="export-texture-format" data-i18n="export.textureFormat">形式</label>
                  <div class="row" style="gap: 8px">
                    <select id="export-texture-format">
                      <option value="png16" data-i18n="btn.exportPng">PNG16 書き出し</option>
                      <option value="raw16" data-i18n="btn.exportRaw">R16 書き出し</option>
                    </select>
                    <button id="btn-export-texture" disabled data-i18n="btn.exportTexture">
                      テクスチャーを書き出し
                    </button>
                  </div>
                </div>
                <div class="export-group">
                  <h3 data-i18n="export.data">データのエクスポート</h3>
                  <button id="btn-export-zip" disabled data-i18n="btn.exportZip" title="再取り込み可能なバックアップZIP">
                    エクスポート
                  </button>
                </div>
              </div>
            </div>
          </section>
        </div>

        <!-- 環境設定 -->
        <div id="rview-settings" class="rview hidden">
          <section class="settings-group">
            <h3 class="settings-section-title" data-i18n="settings.general">一般</h3>
            <label data-i18n="side.language">言語 / Language</label>
            <select id="lang-select">
              <option value="ja">日本語</option>
              <option value="en">English</option>
            </select>
          </section>

          <section class="settings-group">
            <h3 class="settings-section-title" data-i18n="settings.mapbox">Mapbox</h3>
            <label data-i18n="side.token">Mapbox アクセストークン</label>
            <div class="row">
              <input id="token" type="password" placeholder="pk.xxxxx" />
              <button id="btn-save-token" data-i18n="btn.save">保存</button>
            </div>
            <p class="muted" id="token-status"></p>
          </section>

          <section class="settings-group">
            <h3 class="settings-section-title" data-i18n="settings.view3d">3D ビュー</h3>
            <div class="settings-subsection">
              <h4 data-i18n="settings.displayCamera">表示・カメラ</h4>
            <label class="checkbox-row">
              <input id="chk-auto-fit" type="checkbox" />
              <span data-i18n="settings.autoFit"
                >ロケーション切替時に自動でフィット（全体が収まるように）</span
              >
            </label>
            <label class="checkbox-row">
              <input id="chk-scale-annotations" type="checkbox" />
              <span data-i18n="settings.scaleAnnotations"
                >地点マーカー・線・ラベルを地形スケールに合わせて拡縮</span
              >
            </label>
            <label class="checkbox-row">
              <input id="chk-sea-level" type="checkbox" />
              <span data-i18n="settings.seaLevelBase"
                >海抜標高で配置（海面=0m を基準に地形を浮かせる）</span
              >
            </label>
            <label data-i18n="settings.backgroundColor">背景色</label>
            <div class="contour-reset-row">
              <input id="background-color" type="color" value="#111417" />
              <button
                id="btn-background-color-reset"
                type="button"
                class="vp-icon"
                data-i18n-title="settings.fovReset"
                title="初期値に戻す"
              >
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
              </button>
            </div>
            <label
              ><span data-i18n="settings.fov">カメラの画角</span>:
              <span id="fov-val">50</span>°</label
            >
            <div class="row">
              <input id="camera-fov" type="range" min="20" max="90" value="50" />
              <button
                id="btn-fov-reset"
                class="vp-icon"
                data-i18n-title="settings.fovReset"
                title="初期値に戻す"
              >
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
              </button>
            </div>
            <label data-i18n="settings.transition">切替トランジション</label>
            <select id="transition-mode">
              <option value="none" data-i18n="transition.none">なし</option>
              <option value="slide" data-i18n="transition.slide">横スライド</option>
              <option value="wipe" data-i18n="transition.wipe">ワイプ</option>
              <option value="morph" data-i18n="transition.morph">ハイト・モーフ</option>
            </select>
            </div>

            <div class="settings-subsection">
              <h4 data-i18n="settings.annotations">注釈</h4>
            <label class="checkbox-row">
              <input id="chk-fixed-label" type="checkbox" />
              <span data-i18n="settings.fixedLabelSize"
                >地名ラベルを画面に対して一定サイズで表示（ズームで拡縮しない）</span
              >
            </label>
            <label data-i18n="settings.labelDeclutter">地名ラベルの重なり回避</label>
            <select id="label-declutter">
              <option value="none" data-i18n="declutter.none">なし</option>
              <option value="stack" selected data-i18n="declutter.stack">上へ逃がす（全部表示）</option>
              <option value="hideFar" data-i18n="declutter.hideFar">奥を隠す（手前を優先）</option>
            </select>
            </div>

            <div class="settings-subsection">
              <h4 data-i18n="settings.routes">ルート</h4>
            <label data-i18n="settings.routeDistanceMode">ルート距離の計算</label>
            <select id="route-distance-mode">
              <option value="horizontal" selected data-i18n="routeDistance.horizontal">水平距離</option>
              <option value="surface" data-i18n="routeDistance.surface">実距離（斜距離）</option>
            </select>
            </div>

            <div class="settings-subsection">
              <h4 data-i18n="settings.contours">等高線</h4>
            <label data-i18n="settings.contourInterval">等高線の間隔</label>
            <select id="contour-interval">
              <option value="5">5m</option>
              <option value="10" selected>10m</option>
              <option value="20">20m</option>
              <option value="50">50m</option>
              <option value="100">100m</option>
              <option value="200">200m</option>
            </select>
            <label data-i18n="settings.contourColorMode">等高線の色モード</label>
            <select id="contour-color-mode">
              <option value="solid" selected data-i18n="contourColorMode.solid">単色</option>
              <option value="gradient" data-i18n="contourColorMode.gradient">グラデーション</option>
            </select>
            <div id="contour-solid-controls">
              <label data-i18n="settings.contourColor">等高線の色</label>
              <div class="contour-reset-row">
                <input id="contour-color" type="color" value="#203040" />
                <button
                  id="btn-contour-color-reset"
                  type="button"
                  class="vp-icon"
                  data-i18n-title="settings.fovReset"
                  title="初期値に戻す"
                >
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>
              </div>
            </div>
            <div id="contour-gradient-controls" class="hidden" hidden>
              <label data-i18n="settings.contourGradient">グラデーション</label>
              <div class="contour-reset-row">
                <div id="contour-gradient-editor" class="gradient-editor">
                  <div id="contour-gradient-track" class="gradient-track"></div>
                </div>
                <button
                  id="btn-contour-gradient-reset"
                  type="button"
                  class="vp-icon"
                  data-i18n-title="settings.fovReset"
                  title="初期値に戻す"
                >
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>
              </div>
              <div class="row gradient-stop-controls">
                <label>
                  <span data-i18n="settings.contourGradientPosition">位置</span>
                  <input id="contour-gradient-position" type="number" min="0" max="100" step="1" value="0" />
                </label>
                <label>
                  <span data-i18n="settings.contourGradientColor">色</span>
                  <input id="contour-gradient-color" type="color" value="#2f80ed" />
                </label>
              </div>
            </div>
            </div>
          </section>
        </div>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
